[general]
live_config_reload = true

[window]
padding = { x = 8, y = 8 }
dynamic_padding = true
decorations = "None"
opacity = 0.85
blur = true
startup_mode = "Maximized"

[scrolling]
history = 10000
multiplier = 3

[font]
size = 11.0
offset = { x = 0, y = -1 }

[font.normal]
family = "FiraCode Nerd Font Mono"
style = "Regular"

[font.bold]
family = "FiraCode Nerd Font Mono"
style = "Bold"

[colors]
cursor = { text = "#000000", cursor = "#d8d8d8" }

[colors.primary]
foreground = "#d8d8d8"
background = "#181818"

[selection]
save_to_clipboard = true

[cursor]
style = { shape = "Beam", blinking = "On" }
thickness = 0.2

[mouse]
hide_when_typing = true

[[keyboard.bindings]]
key = "NumpadComma"
chars = "."
